# Build release on new tag creating event
---
kind: pipeline
type: docker
name: doc-search-release

trigger:
  event:
    - tag

environment:
  REGISTRY_ADDRESS: ${REGISTRY_ADDRESS}

steps:
  - name: build-and-push-docker
    image: plugins/docker
    settings:
      repo: 192.168.0.84:3000/sova-core/doc-search
      insecure: true
      dockerfile: Dockerfile
      registry: 192.168.0.84:3000
      tags:
        - ${DRONE_COMMIT_SHA:0:8}
        - ${DRONE_TAG}
        - latest
      username:
        from_secret: GITEA_USERNAME
      password:
        from_secret: GITEA_TOKEN

volumes:
  - name: rust-targets
    temp: {}
